services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: bidsmart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bidsmart_db
      POSTGRES_USER: bidsmart_user
      POSTGRES_PASSWORD: bidsmart_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidsmart_user -d bidsmart_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./BidSmart Backend
      dockerfile: Dockerfile
    container_name: bidsmart-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/bidsmart_db
      DB_USERNAME: bidsmart_user
      DB_PASSWORD: bidsmart_password
      JWT_SECRET: BidSmartJwtSecretKeyForLocalDevelopment1234567890
      JWT_EXPIRATION_MS: 2592000000
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: http://localhost:8080
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # React Frontend (served via nginx)
  frontend:
    build:
      context: ./BidSmart Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8081
    container_name: bidsmart-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
