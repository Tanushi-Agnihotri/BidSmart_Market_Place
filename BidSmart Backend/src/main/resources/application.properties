spring.application.name=BidSmart

# ============================================================================
# SERVER PORT
# Render injects the PORT env var automatically for web services — the app
# MUST bind to it or Render reports "No open ports detected". Locally we fall
# back to SERVER_PORT (8081).
# ============================================================================
server.port=${PORT:${SERVER_PORT:8081}}
server.address=0.0.0.0

# ============================================================================
# POSTGRESQL CONNECTION (Aiven Cloud)
# Non-sensitive defaults (host/port/db/user) are here so the app boots without
# env vars. DB_PASSWORD MUST come from the environment — never commit it.
#   - Render: set DB_PASSWORD in the dashboard (sync:false in render.yaml)
#   - Local:  export DB_PASSWORD=... before running, or use a .env loader
# DB_URL_PARAMS=?sslmode=require because Aiven requires SSL.
# ============================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:bidsmart-1-tanushiagni-2777.i.aivencloud.com}:${DB_PORT:17051}/${DB_NAME:defaultdb}${DB_URL_PARAMS:?sslmode=require}}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — Aiven free-tier Postgres can take a few seconds to respond on cold connections.
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================================
# JPA / Hibernate
# ============================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============================================================================
# Flyway — retry on cold start (DB may still be waking up).
# ============================================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.connect-retries=10
spring.flyway.connect-retries-interval=5

# ============================================================================
# CORS / Frontend URL
# On Render: FRONTEND_URL=https://bidsmart-frontend.onrender.com
# ============================================================================
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:8080}

# ============================================================================
# JWT — JWT_SECRET is auto-generated on Render (generateValue: true).
# ============================================================================
app.jwt.secret=${JWT_SECRET:BidSmartJwtSecretKeyForLocalDevelopment1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:2592000000}

# ============================================================================
# Google OAuth
# ============================================================================
app.google.client-id=${GOOGLE_CLIENT_ID:777199217627-ha33gdsl8itp048scdrltt4ittmuuh34.apps.googleusercontent.com}

# ============================================================================
# Email / SMTP — leave GMAIL_USERNAME + GMAIL_APP_PASSWORD blank to disable
# real sends (password reset links get logged to the backend console instead).
# ============================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
app.mail.from=${MAIL_FROM:BidSmart <no-reply@bidsmart.local>}

# ============================================================================
# File Upload
# NOTE: Render free-tier filesystem is ephemeral — uploads are wiped on every
# restart/redeploy. For persistence use S3 / Cloudinary / Render Disk (paid).
# ============================================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ============================================================================
# Actuator / health — Render probes / to check liveness; keep a lightweight
# health endpoint exposed so cold-start probing doesn't hammer the full app.
# ============================================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ============================================================================
# Logging — keep prod logs readable.
# ============================================================================
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=INFO
logging.level.org.flywaydb=INFO
